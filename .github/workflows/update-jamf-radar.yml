name: Update Jamf Radar

on:
  schedule:
    # 13:00 UTC daily (~6am Pacific / 9am Eastern). Adjust as you like.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_jamf_radar.py

      - name: Commit and push if changed
        run: |
          git config user.name "jamf-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add jamf_data.json index.html
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "Daily Jamf Radar update: $(date -u +'%Y-%m-%d')"
            git push
          fi
