<title>Jamf Radar</title>

    --bg: #090c15;
    --card: #121729;
    --card-border: #232b42;
    --text: #f1f3f9;
    --text-dim: #8b93ab;
    --indigo: #6f6bf0;
    --blue: #4f8cff;
    --grad: linear-gradient(135deg, #6f6bf0, #4f8cff);
    --stat-num: #6f8dff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 28px 32px 22px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    background:
      radial-gradient(600px 200px at 10% -40%, rgba(111,107,240,0.20), transparent 70%),
      radial-gradient(500px 180px at 90% -60%, rgba(79,140,255,0.16), transparent 70%);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    border-radius: 13px;
    background: var(--grad);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.01em;
    box-shadow: 0 6px 20px rgba(111,107,240,0.4);
  }
  header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  header .sub {
    color: var(--text-dim);
    font-size: 13.5px;
    margin-top: 4px;
  }
  .status-banner-wrap {
    padding: 0 32px 20px;
    background:
      radial-gradient(600px 200px at 10% -80%, rgba(111,107,240,0.14), transparent 70%),
      radial-gradient(500px 180px at 90% -100%, rgba(79,140,255,0.10), transparent 70%);
  }
  .status-banner {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .status-top {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .status-top .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #34d399;
    box-shadow: 0 0 8px 1px rgba(52,211,153,0.7);
    flex-shrink: 0;
  }
  .status-sub {
    font-size: 13.5px;
    color: var(--text-dim);
  }
  nav.tabs {
    display: flex;
    gap: 10px;
    padding: 18px 32px;
  }
  nav.tabs button {
    appearance: none;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
  }
  nav.tabs button:hover { color: var(--text); border-color: #384162; }
  nav.tabs button.active {
    background: var(--grad);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 6px 20px rgba(111,107,240,0.35);
  }
  main {
    padding: 4px 32px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 22px;
  }
  .stat-num {
    font-size: 32px;
    font-weight: 800;
    color: var(--stat-num);
    line-height: 1;
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 11.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 700;
  }
  .toolbar {
    margin-bottom: 18px;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 15px;
    pointer-events: none;
  }
  .toolbar input[type="search"] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 14px 16px 14px 44px;
    border-radius: 12px;
    font-size: 14px;
    outline: none;
  }
  .toolbar input[type="search"]:focus { border-color: var(--blue); }
  .chip {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--blue); color: var(--text); }
  .chip.active {
    background: var(--indigo);
    border-color: var(--indigo);
    color: #fff;
  }
  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .count-line {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }
  #news-list, #kb-list {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 980px) {
    #news-list, #kb-list { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 680px) {
    #news-list, #kb-list { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px 20px 18px;
    display: flex;
    flex-direction: column;
  }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 10px;
  }
  .card-title a {
    color: var(--text);
    text-decoration: none;
  }
  .card-title a:hover { color: var(--blue); }
  .badge {
    font-size: 10.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    padding: 4px 10px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-Release { background: rgba(79,140,255,0.16); color: #7fb0ff; }
  .badge-Security { background: rgba(190,58,66,0.28); color: #ff9c9c; }
  .badge-Events { background: rgba(139,92,246,0.20); color: #c4b5fd; }
  .badge-DeepDive, .badge-Deep-Dive { background: rgba(155,110,255,0.20); color: #c3a6ff; }
  .badge-Troubleshooting { background: rgba(249,158,66,0.20); color: #fbbf6a; }
  .badge-TipsTricks, .badge-Tips---Tricks { background: rgba(79,140,255,0.16); color: #7fb0ff; }
  .badge-Community { background: rgba(139,147,171,0.18); color: var(--text-dim); }
  .badge-Career { background: rgba(52,199,123,0.18); color: #7ee0ac; }
  .badge-AIGovernance, .badge-AI-Governance { background: rgba(236,72,153,0.18); color: #f8a8cf; }
  .meta-line {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .meta-line a { color: var(--text-dim); }
  .summary {
    font-size: 13.5px;
    line-height: 1.6;
    color: #c6cbdb;
    margin-bottom: 12px;
    flex: 1;
  }
  .tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 11px;
    color: var(--text-dim);
    background: #0d1120;
    border: 1px solid var(--card-border);
    padding: 2px 9px;
    border-radius: 999px;

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12.5px;
    color: var(--text-dim);
    padding-top: 12px;
    border-top: 1px solid var(--card-border);
    margin-top: auto;
  }
  .card-footer a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 700;
  }
  .card-footer a:hover { text-decoration: underline; }
  /* KB specific */
  .kb-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 11.5px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

    font-weight: 800;
    padding: 3px 9px;
    border-radius: 999px;

  .diff-Medium { background: rgba(249,158,66,0.20); color: #fbbf6a; }
  .diff-Advanced { background: rgba(190,58,66,0.28); color: #ff9c9c; }

    cursor: pointer;
    font-size: 12.5px;
    font-weight: 700;
    color: var(--blue);
    outline: none;
    user-select: none;
  }
  .kb-section-title {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    margin: 12px 0 5px;
    font-weight: 700;
  }
  .kb-section-title:first-of-type { margin-top: 12px; }
  ol, ul.causes {
    margin: 0;
    padding-left: 20px;
    font-size: 13px;
    line-height: 1.6;
    color: #c6cbdb;
  }
  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 0;
    font-size: 14px;
    grid-column: 1 / -1;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  @media (max-width: 640px) {
    header, nav.tabs, main { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>

    </div>
    <div class="chip-row" id="kb-categories"></div>
    <div class="count-line" id="kb-count"></div>
    <div id="kb-list"></div>
  </div>
</main>

<script>
(function () {
  const raw = document.getElementById('jamf-data').textContent;
  const data = JSON.parse(raw);
  const news = (data.news || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  const kb = data.kb || [];

  function relTime(iso) {
    try {
      const then = new Date(iso);
      const now = new Date();
      const diffDays = Math.floor((now - then) / 86400000);
      if (diffDays <= 0) return 'today';
      if (diffDays === 1) return '1 day ago';
      return diffDays + ' days ago';
    } catch (e) { return ''; }
  }
  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return iso; }
  }
  document.getElementById('lastUpdated').textContent = relTime(data.lastUpdated) + ' · ' + fmtDate(data.lastUpdated);

  function badgeClass(cat) {
    return 'badge badge-' + String(cat).replace(/[^A-Za-z]/g, '');
  }
  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }
  function fmtShortDate(iso) {
    try {
      const d = new Date(iso + 'T00:00:00');
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    } catch (e) { return iso; }
  }

  // ---- NEWS STATS ----
  function renderNewsStats() {
    const counts = {};
    news.forEach(n => { counts[n.category] = (counts[n.category] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3);
    const cards = [{ label: 'Tracked Updates', num: news.length }]
      .concat(top.map(([cat, n]) => ({ label: cat, num: n })));
    document.getElementById('news-stats').innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-num">${c.num}</div>
        <div class="stat-label">${esc(c.label)}</div>
      </div>
    `).join('');
  }

  // ---- NEWS TAB ----
  const newsCats = Array.from(new Set(news.map(n => n.category))).sort();
  let activeNewsCat = null;
  const newsCatRow = document.getElementById('news-categories');
  function renderNewsChips() {
    newsCatRow.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'chip' + (activeNewsCat === null ? ' active' : '');
    allChip.textContent = 'All';
    allChip.onclick = () => { activeNewsCat = null; renderNewsChips(); renderNews(); };
    newsCatRow.appendChild(allChip);
    newsCats.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'chip' + (activeNewsCat === cat ? ' active' : '');
      chip.textContent = cat;
      chip.onclick = () => { activeNewsCat = (activeNewsCat === cat ? null : cat); renderNewsChips(); renderNews(); };
      newsCatRow.appendChild(chip);
    });
  }

  function renderNews() {
    const q = document.getElementById('news-search').value.trim().toLowerCase();
    const list = document.getElementById('news-list');
    const filtered = news.filter(n => {
      if (activeNewsCat && n.category !== activeNewsCat) return false;
      if (!q) return true;
      const hay = [n.title, n.summary, n.source, (n.tags || []).join(' ')].join(' ').toLowerCase();
      return hay.includes(q);
    });
    document.getElementById('news-count').textContent = filtered.length + ' of ' + news.length + ' items';
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state">No news items match your filters.</div>';
      return;
    }
    list.innerHTML = filtered.map(n => `
      <div class="card">
        <div class="card-top">
          <span class="${badgeClass(n.category)}">${esc(n.category)}</span>
          <span class="meta-line" style="margin-bottom:0;">${esc(fmtShortDate(n.date))}</span>
        </div>
        <div class="card-title"><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.title)}</a></div>
        <div class="summary">${esc(n.summary)}</div>
        <div class="tags">${(n.tags || []).map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>
        <div class="card-footer">
          <span>${esc(n.source)}</span>
          <a href="${esc(n.url)}" target="_blank" rel="noopener">Open source →</a>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('news-search').addEventListener('input', renderNews);
  renderNewsStats();
  renderNewsChips();
  renderNews();

  // ---- KB STATS ----
  function renderKbStats() {
    const diffCounts = { Easy: 0, Medium: 0, Advanced: 0 };
    kb.forEach(k => { if (diffCounts[k.difficulty] !== undefined) diffCounts[k.difficulty]++; });
    const cards = [
      { label: 'KB Entries', num: kb.length },
      { label: 'Easy Fixes', num: diffCounts.Easy },
      { label: 'Medium', num: diffCounts.Medium },
      { label: 'Advanced', num: diffCounts.Advanced },
    ];
    document.getElementById('kb-stats').innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-num">${c.num}</div>
        <div class="stat-label">${esc(c.label)}</div>
      </div>
    `).join('');
  }

  // ---- KB TAB ----
  const kbCats = Array.from(new Set(kb.map(k => k.category))).sort();
  let activeKbCat = null;
  const kbCatRow = document.getElementById('kb-categories');
  function renderKbChips() {
    kbCatRow.innerHTML = '';
    const allChip = document.createElement('button');
    allChip.className = 'chip' + (activeKbCat === null ? ' active' : '');
    allChip.textContent = 'All';
    allChip.onclick = () => { activeKbCat = null; renderKbChips(); renderKb(); };
    kbCatRow.appendChild(allChip);
    kbCats.forEach(cat => {
      const chip = document.createElement('button');
      chip.className = 'chip' + (activeKbCat === cat ? ' active' : '');
      chip.textContent = cat;
      chip.onclick = () => { activeKbCat = (activeKbCat === cat ? null : cat); renderKbChips(); renderKb(); };
      kbCatRow.appendChild(chip);
    });
  }

  function renderKb() {
    const q = document.getElementById('kb-search').value.trim().toLowerCase();
    const list = document.getElementById('kb-list');
    const filtered = kb.filter(k => {
      if (activeKbCat && k.category !== activeKbCat) return false;
      if (!q) return true;
      const hay = [k.title, k.symptom, k.category, (k.tags || []).join(' ')].join(' ').toLowerCase();
      return hay.includes(q);
    });
    document.getElementById('kb-count').textContent = filtered.length + ' of ' + kb.length + ' entries';
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state">No KB entries match your filters.</div>';
      return;
    }
    list.innerHTML = filtered.map(k => `
      <div class="card">
        <div class="card-top">
          <span class="badge badge-Community">${esc(k.category)}</span>
          <span class="diff diff-${esc(k.difficulty)}">${esc(k.difficulty)}</span>
        </div>
        <div class="card-title">${esc(k.title)}</div>
        <div class="kb-meta"><span>Applies to: ${esc(k.appliesTo)}</span></div>
        <div class="summary">${esc(k.symptom)}</div>
        <details class="kb-details">
          <summary>View causes &amp; step-by-step fix</summary>
          <div class="kb-section-title">Likely causes</div>
          <ul class="causes">${(k.causes || []).map(c => `<li>${esc(c)}</li>`).join('')}</ul>
          <div class="kb-section-title">Solution steps</div>
          <ol>${(k.solution || []).map(s => `<li>${esc(s)}</li>`).join('')}</ol>
        </details>
        <div class="tags">${(k.tags || []).map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div>
        <div class="card-footer">
          <span>${esc(k.source)}</span>
          <a href="${esc(k.url)}" target="_blank" rel="noopener">Open source →</a>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('kb-search').addEventListener('input', renderKb);
  renderKbStats();
  renderKbChips();
  renderKb();

  // ---- TABS ----
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });
})();
</script>

</body>
</html>
